services:
  db:
    image: postgres:16.2-alpine
    container_name: condoa-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-condoa}
      POSTGRES_INITDB_ARGS: '-E UTF8 --locale=C'
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-condoa}']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - condoa-network

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    container_name: condoa-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USERNAME:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - condoa-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: condoa-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3333}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-condoa}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-chave-secreta-access-condoa}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-chave-secreta-refresh-condoa}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      JWT_REFRESH_COOKIE_NAME: ${JWT_REFRESH_COOKIE_NAME:-refreshToken}
      JWT_REFRESH_COOKIE_PATH: ${JWT_REFRESH_COOKIE_PATH:-/auth}
      JWT_REFRESH_COOKIE_SECURE: ${JWT_REFRESH_COOKIE_SECURE:-false}
      JWT_REFRESH_COOKIE_SAME_SITE: ${JWT_REFRESH_COOKIE_SAME_SITE:-lax}
      BCRYPT_SALT_ROUNDS: ${BCRYPT_SALT_ROUNDS:-10}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: false
      MINIO_USERNAME: ${MINIO_USERNAME:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      CHOKIDAR_USEPOLLING: true
      WATCHPACK_POLLING: true
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'wget -qO- http://localhost:3333/health > /dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - condoa-network

volumes:
  app_node_modules:
  db_data:
  minio_data:

networks:
  condoa-network:
    driver: bridge
